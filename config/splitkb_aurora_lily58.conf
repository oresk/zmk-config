# Uncomment these two line to add support for encoders to your firmware
# CONFIG_EC11=y
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Enable display (nice!view uses Sharp memory LCD over SPI)
CONFIG_ZMK_DISPLAY=y

# Explicitly disable OLED driver - nice!view uses Sharp, not SSD1306
CONFIG_SSD1306=n

# Uncomment the following lines to enable RGB underglow
# CONFIG_ZMK_RGB_UNDERGLOW=y

# Power management
CONFIG_ZMK_SLEEP=n

#CONFIG_PM_DEVICE=n
#CONFIG_PM=n

