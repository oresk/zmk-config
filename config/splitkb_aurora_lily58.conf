# Uncomment these two line to add support for encoders to your firmware
# CONFIG_EC11=y
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Uncomment the following line to enable the OLED Display
CONFIG_ZMK_DISPLAY=y

# Uncomment the following lines to enable RGB underglow
# CONFIG_ZMK_RGB_UNDERGLOW=y

# Power management
# Re-enable nRF52840 high-voltage DC-DC for battery life (disabled by default in main)
CONFIG_SOC_DCDC_NRF52X_HV=y

CONFIG_ZMK_SLEEP=n

#CONFIG_PM_DEVICE=n
#CONFIG_PM=n

